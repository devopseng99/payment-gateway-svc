apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway-svc
  namespace: payment-gateway-svc
  labels:
    app: payment-gateway-svc
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-gateway-svc
  template:
    metadata:
      labels:
        app: payment-gateway-svc
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      serviceAccountName: payment-gateway-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: payment-gateway-svc
          image: localhost/payment-gateway-svc:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: grpc-otlp
              containerPort: 4317
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: payment-gateway-svc-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: payment-gateway-svc-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-svc-secrets
                  key: REDIS_PASSWORD
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-svc-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: ADYEN_WEBHOOK_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-svc-secrets
                  key: ADYEN_WEBHOOK_HMAC_KEY
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      nodeSelector:
        kubernetes.io/hostname: mgplcb05
